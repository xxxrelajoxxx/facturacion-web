<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logístico - BigQuery</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header span { font-size: 13px; opacity: .8; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        .kpi-card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
        .kpi-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .kpi-card .sub { font-size: 12px; color: #888; margin-top: 2px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px,1fr)); gap: 15px; margin-bottom: 25px; }
        .chart-card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        .chart-card h3 { font-size: 14px; margin-bottom: 10px; color: #444; }
        .chart-card canvas { max-height: 280px; }
        .tabla-section { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 2px 6px rgba(0,0,0,.08); margin-bottom: 25px; }
        .tabla-section h3 { font-size: 14px; margin-bottom: 10px; color: #444; }
        .tabla-section select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8f9fa; text-align: left; padding: 8px 10px; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
        td { padding: 6px 10px; border-bottom: 1px solid #eee; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover { background: #f5f8ff; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { color: #d32f2f; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard Logístico</h1>
        <span>BigQuery · <span id="fecha-actual"></span></span>
    </div>
    <div class="container">
        <div class="kpi-grid" id="kpi-grid"></div>
        <div class="chart-grid">
            <div class="chart-card"><h3>Fletes por Mes</h3><canvas id="chart-fletes-mes"></canvas></div>
            <div class="chart-card"><h3>OC por Estado</h3><canvas id="chart-oc-estado"></canvas></div>
            <div class="chart-card"><h3>Despachos por Planta</h3><canvas id="chart-despachos"></canvas></div>
            <div class="chart-card"><h3>On-Time vs Off-Time</h3><canvas id="chart-ontime"></canvas></div>
            <div class="chart-card"><h3>Top Transportistas</h3><canvas id="chart-transportistas"></canvas></div>
            <div class="chart-card"><h3>Conciliación de Fletes</h3><canvas id="chart-validacion"></canvas></div>
        </div>
        <div class="tabla-section">
            <h3>Vista Previa de Tablas</h3>
            <select id="select-tabla" onchange="cargarTabla()"></select>
            <div id="tabla-container"><div class="loading">Selecciona una tabla...</div></div>
        </div>
    </div>

    <script>
        const PROYECTO = 'databigquery-488922';
        const DATASET = 'datos_mysql';
        const COLORES = ['#1a73e8','#34a853','#fbbc04','#ea4335','#9c27b0','#00acc1','#ff7043','#4caf50','#e91e63','#3f51b5'];

        document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-CL', {year:'numeric',month:'long',day:'numeric'});

        fetch('/api/tablas_info').then(r=>r.json()).then(tablas => {
            const sel = document.getElementById('select-tabla');
            tablas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.nombre;
                opt.textContent = `${t.nombre} (${t.filas.toLocaleString()} filas)`;
                sel.appendChild(opt);
            });
        });

        function cargarTabla() {
            const nombre = document.getElementById('select-tabla').value;
            if (!nombre) return;
            const div = document.getElementById('tabla-container');
            div.innerHTML = '<div class="loading">Cargando...</div>';
            fetch(`/api/tabla/${nombre}`).then(r=>r.json()).then(data => {
                if (!data.length) { div.innerHTML = '<div class="loading">Sin datos</div>'; return; }
                let html = '<div style="overflow-x:auto"><table><thead><tr>';
                Object.keys(data[0]).forEach(k => html += `<th>${k}</th>`);
                html += '</tr></thead><tbody>';
                data.forEach(row => {
                    html += '<tr>';
                    Object.values(row).forEach(v => html += `<td>${v ?? ''}</td>`);
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                div.innerHTML = html;
            }).catch(() => div.innerHTML = '<div class="error">Error al cargar datos</div>');
        }

        async function cargarKPI() {
            const r = await fetch('/api/resumen').then(r=>r.json());
            const grid = document.getElementById('kpi-grid');
            const items = [
                {label:'Órdenes de Carga', value:r.total_oc.toLocaleString()},
                {label:'Fletes', value:r.total_fletes.toLocaleString()},
                {label:'Despachos', value:r.total_despachos.toLocaleString()},
                {label:'On-Time', value:`${r.on_time_pct}%`, sub:`${r.total_on_time.toLocaleString()} viajes`},
                {label:'Viajes Pendientes', value:r.total_viajes_pend.toLocaleString()},
            ];
            grid.innerHTML = items.map(i => `
                <div class="kpi-card">
                    <div class="label">${i.label}</div>
                    <div class="value">${i.value}</div>
                    ${i.sub ? `<div class="sub">${i.sub}</div>` : ''}
                </div>
            `).join('');
        }

        function crearChart(id, tipo, labels, datasets, opts={}) {
            new Chart(document.getElementById(id), {
                type: tipo,
                data: { labels, datasets },
                options: { responsive: true, maintainAspectRatio: false, ...opts }
            });
        }

        async function cargarCharts() {
            const fletes = await fetch('/api/fletes_mes').then(r=>r.json());
            if (fletes.length) {
                crearChart('chart-fletes-mes', 'bar', fletes.map(d=>d.mes), [{
                    label:'Cantidad', data:fletes.map(d=>d.cantidad), backgroundColor:COLORES[0]
                }]);
            }

            const oc = await fetch('/api/oc_estado').then(r=>r.json());
            if (oc.length) {
                crearChart('chart-oc-estado', 'doughnut', oc.map(d=>d.estado), [{
                    data: oc.map(d=>d.cantidad), backgroundColor: COLORES.slice(0,oc.length)
                }]);
            }

            const desp = await fetch('/api/despachos_planta').then(r=>r.json());
            if (desp.length) {
                crearChart('chart-despachos', 'bar', desp.map(d=>d.nom_planta), [{
                    label:'Despachos', data:desp.map(d=>d.cantidad), backgroundColor:COLORES[1]
                }]);
            }

            const ot = await fetch('/api/on_time_trend').then(r=>r.json());
            if (ot.length) {
                crearChart('chart-ontime', 'line', ot.map(d=>d.mes), [
                    {label:'On-Time', data:ot.map(d=>d.on_time), borderColor:COLORES[1], backgroundColor:'rgba(52,168,83,.1)', fill:true, tension:.3},
                    {label:'Off-Time', data:ot.map(d=>d.off_time), borderColor:COLORES[3], backgroundColor:'rgba(234,67,53,.1)', fill:true, tension:.3}
                ]);
            }

            const transp = await fetch('/api/transportistas').then(r=>r.json());
            if (transp.length) {
                crearChart('chart-transportistas', 'bar', transp.map(d=>d.nombre_compania).reverse(), [{ label:'Total (S/)', data:transp.map(d=>d.total).reverse(), backgroundColor:COLORES[4] }], { indexAxis: 'y' });
            }

            const val = await fetch('/api/validacion').then(r=>r.json());
            if (val.length) {
                crearChart('chart-validacion', 'doughnut', val.map(d=>d.estado_conciliacion), [{
                    data: val.map(d=>d.cantidad), backgroundColor: COLORES.slice(0,val.length)
                }]);
            }
        }

        cargarKPI();
        cargarCharts();
    </script>
</body>
</html>
