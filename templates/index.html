<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logístico</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:#0a0d14; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:18px 28px; border-bottom:1px solid rgba(255,255,255,.06); }
        .header h1 { font-size:22px; font-weight:700; background:linear-gradient(135deg,#4fc3f7,#00e676); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-.3px; }
        .header-right { display:flex; align-items:center; gap:14px; }
        .header-right img { height:32px; width:auto; }
        .header-right span { font-size:11px; color:#5a6a7e; }
        .hero { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; position:relative; overflow:hidden; }
        .hero::before { content:''; position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(79,195,247,.06),transparent 70%); top:-200px; right:-200px; pointer-events:none; }
        .hero::after { content:''; position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(0,230,118,.04),transparent 70%); bottom:-200px; left:-150px; pointer-events:none; }
        .nav-card { position:relative; background:linear-gradient(145deg,#141b2d,#1a2332); border:1px solid rgba(255,255,255,.06); border-radius:20px; cursor:pointer; transition:all .4s cubic-bezier(.4,0,.2,1); max-width:460px; width:100%; overflow:hidden; }
        .nav-card:hover { border-color:rgba(79,195,247,.4); transform:translateY(-6px); box-shadow:0 12px 48px rgba(79,195,247,.12); }
        .nav-card:active { transform:translateY(-2px); }
        .card-visual { position:relative; display:flex; align-items:center; justify-content:center; height:200px; overflow:hidden; background:linear-gradient(135deg,#0f1a2e,#162040); }
        .card-visual img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.35; transition:transform .5s; }
        .nav-card:hover .card-visual img { transform:scale(1.06); }
        .card-visual::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 40%,#141b2d 100%); pointer-events:none; }
        .card-visual h2 { position:relative; z-index:1; font-size:28px; font-weight:800; color:#fff; letter-spacing:-.5px; text-shadow:0 2px 20px rgba(0,0,0,.6); background:linear-gradient(135deg,#4fc3f7,#00e676); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .card-body { padding:0 48px 40px; text-align:center; }
        .card-body p { color:#8892b0; font-size:14px; margin-bottom:24px; line-height:1.6; margin-top:-8px; }
        .card-body .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 32px; border-radius:10px; font-size:14px; font-weight:600; background:linear-gradient(135deg,#4fc3f7,#00e676); color:#0a0d14; text-decoration:none; transition:all .3s; }
        .card-body .btn:hover { opacity:.9; transform:scale(1.02); }
        .footer { text-align:center; padding:16px; font-size:11px; color:#2a3040; border-top:1px solid rgba(255,255,255,.04); }
        @media(max-width:600px) {
            .header { padding:14px 18px; }
            .header h1 { font-size:17px; }
            .header-right img { height:24px; }
            .card-visual { height:150px; }
            .card-visual h2 { font-size:22px; }
            .card-body { padding:0 28px 32px; }
            .card-body p { font-size:13px; }
            .card-body .btn { padding:10px 24px; font-size:13px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard Logístico</h1>
        <div class="header-right">
            <img src="/static/LOGO-AJE.png" alt="AJE">
            <span id="fecha-actual"></span>
        </div>
    </div>
    <div class="hero">
        <div class="nav-card" onclick="window.location='/fletes'">
            <div class="card-visual">
                <img src="/static/logo2.jpg" alt="">
                <h2>Facturación</h2>
            </div>
            <div class="card-body">
                <p>Reporte de facturación, cobranza y control de gestión con indicadores comerciales y operativos</p>
                <div class="btn">Ir al reporte →</div>
            </div>
        </div>
    </div>
    <div class="footer">BigQuery · databigquery-488922</div>
    <script>
        document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-PE',
            {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    </script>
</body>
</html>
